<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大富翁骰子</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">
<script src="./js/data.js"></script>
</head>
<body>
<div class="w" id="w">
  <div class="ceiling"></div>
  <div class="felt"></div>
  <div class="spotlight"></div>
  <div class="flash-overlay" id="flashOverlay"></div>

  <div class="combo-area" id="comboArea">
    <div class="combo-label">C O M B O</div>
    <div class="combo-num" id="comboNum">×2</div>
    <div class="combo-fire" id="comboFire">🔥</div>
  </div>

  <div class="explosion-wrap" id="explosionWrap" style="display:none"></div>

  <div class="btns" onclick="event.stopPropagation()">
    <div style="display:flex; gap:10px; margin-bottom:10px">
      <button class="db" id="b1" onclick="setCount(1)">×1</button>
      <button class="db on" id="b2" onclick="setCount(2)">×2</button>
    </div>
    <button class="db btn-card btn-comm" onclick="drawCard('comm')">公益福利</button>
    <button class="db btn-card btn-chan" onclick="drawCard('chan')">机会卡</button>
  </div>

  <div class="total-area" id="totalArea">
    <div class="total-label">T O T A L</div>
    <div class="total-num" id="totalNum">—</div>
    <div class="indiv" id="indiv"></div>
  </div>

  <div class="stage" id="stage"></div>
  <div class="hint" id="hint">— 点击任意处掷骰 —</div>
</div>

<div id="cardModal" onclick="this.classList.remove('active')">
  <div class="card-box">
    <div id="cardTitle" class="card-title"></div>
    <div id="cardDesc" class="card-desc"></div>
    <div class="anywhere-hint">点击任意处收回卡片</div>
  </div>
</div>
<script src="./js/app.js"></script>
</body>
</html>
