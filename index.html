<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zzZ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Consolas,monospace;
    overflow:hidden;
}

/* 扫描线 */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        transparent 0px,
        transparent 2px,
        rgba(0,255,120,0.05) 3px
    );
    pointer-events:none;
}

/* 主ID */
.id{
    font-size:10vw;
    color:#00ff9c;
    letter-spacing:10px;
    text-shadow:
        0 0 5px #00ff9c,
        0 0 20px #00ff9c,
        0 0 40px #00ff9c;
    animation:
        glow 2.5s ease-in-out infinite alternate,
        flicker 5s infinite;
}

/* 呼吸光效 */
@keyframes glow{
    from{
        text-shadow:
        0 0 5px #00ff9c,
        0 0 10px #00ff9c;
    }
    to{
        text-shadow:
        0 0 20px #00ff9c,
        0 0 60px #00ff9c;
    }
}

/* 偶尔闪烁 */
@keyframes flicker{
    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }
    20%,24%,55%{
        opacity:0.4;
    }
}
</style>
</head>

<body>

<div class="id">zzZ</div>

</body>
</html>
