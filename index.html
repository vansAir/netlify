
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

.w{
  font-family:'Nunito',sans-serif;
  width:100%;
  aspect-ratio:16/9;
  max-height:360px;
  background:#fef6ff;
  border:4px solid #f0a8d8;
  box-shadow:0 0 0 2px #c9b8f8, 6px 6px 0 #f0a8d8, 6px 6px 0 4px #c9b8f8;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:0;
  position:relative;
  overflow:hidden;
}

.w::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 55% at 10% 20%,rgba(186,220,255,.55) 0%,transparent 70%),
    radial-gradient(ellipse 45% 45% at 90% 80%,rgba(255,192,220,.5) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 10%,rgba(200,180,255,.4) 0%,transparent 70%);
  pointer-events:none;
}

/* Left panel */
.left{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;
  padding:16px 14px 16px 18px;
  height:100%;
  position:relative;z-index:1;
  flex-shrink:0;
  width:160px;
}

.ttl{
  font-size:11px;font-weight:900;letter-spacing:2px;
  color:#a066cc;
  text-align:center;
  text-shadow:2px 2px 0 #f0a8d8,3px 3px 0 rgba(160,102,204,.2);
}

.lbl{color:#c07ab8;font-size:7px;font-weight:700;letter-spacing:2px}

.cnt-row{display:flex;gap:6px;justify-content:center}

.cb{
  width:36px;height:36px;
  background:linear-gradient(170deg,#e8d5fa 0%,#c9b8f8 40%,#a88ee0 100%);
  border:none;color:#5a2d8a;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;
  cursor:pointer;border-radius:8px;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.7),inset 0 -2px 0 rgba(0,0,0,.08),0 4px 0 #9070c8,0 6px 0 #7050a8,0 8px 10px rgba(120,80,200,.25);
  transition:all .1s;
}
.cb:hover{transform:translateY(-1px);box-shadow:inset 0 2px 0 rgba(255,255,255,.7),inset 0 -2px 0 rgba(0,0,0,.08),0 5px 0 #9070c8,0 7px 0 #7050a8,0 10px 12px rgba(120,80,200,.3)}
.cb:active{transform:translateY(4px);box-shadow:inset 0 2px 0 rgba(255,255,255,.4),0 1px 0 #9070c8,0 2px 4px rgba(120,80,200,.2)}
.cb.on{
  background:linear-gradient(170deg,#ffd6ec 0%,#ffb0d8 40%,#f080b8 100%);
  color:#8a1a50;
  transform:translateY(4px);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.7),0 1px 0 #d060a0,0 2px 4px rgba(200,80,140,.2);
}

.rb{
  background:linear-gradient(170deg,#aaeeff 0%,#70d8f8 40%,#38b0e0 100%);
  border:none;color:#0a4a6a;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:10px;
  letter-spacing:1px;padding:10px 16px;
  cursor:pointer;border-radius:10px;white-space:nowrap;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.7),inset 0 -2px 0 rgba(0,0,0,.08),0 5px 0 #1888c0,0 7px 0 #0a5a90,0 10px 14px rgba(20,120,200,.3);
  transition:all .12s;width:100%;text-align:center;
}
.rb:hover{transform:translateY(-2px);box-shadow:inset 0 2px 0 rgba(255,255,255,.7),0 7px 0 #1888c0,0 9px 0 #0a5a90,0 13px 16px rgba(20,120,200,.35)}
.rb:active{transform:translateY(6px);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 0 #1888c0,0 2px 6px rgba(20,120,200,.2)}
.rb.spin{animation:rs .09s infinite}
@keyframes rs{0%{transform:translateY(-1px)}50%{transform:translateY(1px)}100%{transform:translateY(-1px)}}

/* Result inside left panel */
.res-box{
  width:100%;background:rgba(255,255,255,.6);
  border:2px solid rgba(200,160,240,.45);border-radius:10px;
  padding:8px 10px;text-align:center;
  box-shadow:inset 0 1px 4px rgba(180,140,220,.15);
}
.rt{font-size:7px;font-weight:700;color:#c07ab8;letter-spacing:2px;margin-bottom:4px}
.rn{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;min-height:20px;align-items:center}
.rv{color:#5a7aee;font-size:16px;font-weight:900;text-shadow:0 2px 0 rgba(80,100,220,.2);min-width:18px;text-align:center}
.rv.six{color:#f060a8;text-shadow:0 2px 0 rgba(220,80,160,.3);animation:fl .3s 3}
@keyframes fl{50%{color:#fff;text-shadow:0 0 14px #f0a8d8}}
.tot-row{font-size:8px;font-weight:700;color:#a880d0;letter-spacing:1px}
.tot-row b{color:#5a7aee;font-size:14px;text-shadow:0 2px 0 rgba(80,100,220,.2)}

/* Dice area — right, big */
.right{
  flex:1;height:100%;
  display:flex;flex-wrap:wrap;gap:14px;
  justify-content:center;align-items:center;
  background:rgba(255,255,255,.38);
  border-left:2px solid rgba(200,160,240,.35);
  padding:14px;
  position:relative;z-index:1;
  box-shadow:inset 2px 0 12px rgba(180,140,220,.1);
}

.et{color:#c0a0d8;font-size:8px;font-weight:700;letter-spacing:2px;width:100%;text-align:center}

.die{width:96px;height:96px;flex-shrink:0;animation:pop .3s cubic-bezier(.175,.885,.32,1.4)}
@keyframes pop{from{transform:scale(0) rotate(-90deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.die canvas{width:96px;height:96px;image-rendering:pixelated;display:block}
.die.go canvas{animation:spin .07s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.sp{position:absolute;pointer-events:none;animation:sa .7s forwards;z-index:10}
@keyframes sa{to{transform:translateY(-36px) scale(1.4);opacity:0}}
</style>

<div class="w">
  <div class="left">
    <div class="ttl">🎲 大富翁</div>

    <div>
      <div class="lbl" style="text-align:center;margin-bottom:6px">骰子数量</div>
      <div class="cnt-row" id="cb"></div>
    </div>

    <button class="rb" id="rb" onclick="roll()">⚔ 掷出命运</button>

    <div class="res-box">
      <div class="rt">✦ 结果 ✦</div>
      <div class="rn" id="rn"><span style="color:#d8b8f0;font-size:8px;font-weight:700">— —</span></div>
      <div class="tot-row">合计 <b id="tot">—</b></div>
    </div>
  </div>

  <div class="right" id="da">
    <span class="et">— 等待掷骰 —</span>
  </div>
</div>

<script>
const COLS=[
  {b:'#c8a0e8',f:'#ead5fa',d:'#6030a0',hi:'#fff'},
  {b:'#68c0f0',f:'#c8eeff',d:'#1060b0',hi:'#fff'},
  {b:'#f098c8',f:'#ffdaee',d:'#a02868',hi:'#fff'},
  {b:'#80d0a8',f:'#d0f5e0',d:'#186040',hi:'#fff'},
  {b:'#f8c870',f:'#fff2c8',d:'#885000',hi:'#fff'},
  {b:'#98b8f8',f:'#d8eaff',d:'#1840a8',hi:'#fff'},
];
let sel=2,busy=false;

function buildCB(){
  const wrap=document.getElementById('cb');
  wrap.innerHTML='';
  [1,2].forEach(n=>{
    const b=document.createElement('button');
    b.className='cb'+(n===sel?' on':'');
    b.textContent=n;
    b.onclick=()=>{sel=n;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));b.classList.add('on')};
    wrap.appendChild(b);
  });
}

function drawDie(canvas,val,c){
  const S=96,R=14,P=11;
  canvas.width=S;canvas.height=S;
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;

  function rr(x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
    ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
    ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
    ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  }

  // Drop shadow
  ctx.shadowColor='rgba(0,0,0,.22)';ctx.shadowBlur=7;ctx.shadowOffsetY=5;
  ctx.fillStyle=c.b;rr(1,1,S-3,S-4,R);ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  // Bottom face (3D thickness)
  ctx.fillStyle=c.b;rr(1,6,S-3,S-6,R);ctx.fill();

  // Top face
  ctx.fillStyle=c.f;rr(1,1,S-3,S-7,R);ctx.fill();

  // Top highlight band
  ctx.fillStyle='rgba(255,255,255,.5)';
  rr(P,P+1,S-3-P*2,(S-7-P*2)*.38,4);ctx.fill();

  // Subtle border
  ctx.strokeStyle=c.b;ctx.lineWidth=1.5;
  rr(1,1,S-3,S-7,R);ctx.stroke();

  // Dots
  const m=(S-2)/2,o=22,r=5.5;
  const pts={
    1:[[m,m-2]],
    2:[[m-o,m-o],[m+o,m+o]],
    3:[[m-o,m-o-1],[m,m-1],[m+o,m+o-1]],
    4:[[m-o,m-o],[m+o,m-o],[m-o,m+o-2],[m+o,m+o-2]],
    5:[[m-o,m-o],[m+o,m-o],[m,m-1],[m-o,m+o-2],[m+o,m+o-2]],
    6:[[m-o,m-o],[m+o,m-o],[m-o,m-1],[m+o,m-1],[m-o,m+o-2],[m+o,m+o-2]]
  };
  (pts[val]||[]).forEach(([x,y])=>{
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.beginPath();ctx.arc(x+1,y+1.5,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c.d;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.beginPath();ctx.arc(x-1.2,y-1.2,r*.38,0,Math.PI*2);ctx.fill();
  });
}

function roll(){
  if(busy)return;busy=true;
  const btn=document.getElementById('rb');
  btn.classList.add('spin');btn.textContent='✨ 施法中...';
  const da=document.getElementById('da');da.innerHTML='';
  document.getElementById('rn').innerHTML='<span style="color:#d8b8f0;font-size:8px;font-weight:700">— —</span>';
  document.getElementById('tot').textContent='—';

  const dies=[];
  for(let i=0;i<sel;i++){
    const c=COLS[i%COLS.length];
    const div=document.createElement('div');div.className='die go';
    const cv=document.createElement('canvas');div.appendChild(cv);da.appendChild(div);
    dies.push({div,cv,c});drawDie(cv,Math.ceil(Math.random()*6),c);
  }

  let t=0;
  const iv=setInterval(()=>{
    t++;dies.forEach(({cv,c})=>drawDie(cv,Math.ceil(Math.random()*6),c));
    if(t>=20){
      clearInterval(iv);
      const vals=dies.map(({div,cv,c})=>{
        const v=Math.ceil(Math.random()*6);
        drawDie(cv,v,c);
        div.classList.remove('go');
        div.style.animation='none';void div.offsetWidth;
        div.style.animation='pop .32s cubic-bezier(.175,.885,.32,1.4)';
        return v;
      });
      showRes(vals);
      btn.classList.remove('spin');btn.textContent='⚔ 再掷一次';
      busy=false;spawnFx(da);
    }
  },55);
}

function showRes(vals){
  const rn=document.getElementById('rn');rn.innerHTML='';
  vals.forEach((v,i)=>{
    const s=document.createElement('span');
    s.className='rv'+(v===6?' six':'');s.textContent=v;
    setTimeout(()=>rn.appendChild(s),i*80);
  });
  document.getElementById('tot').textContent=vals.reduce((a,b)=>a+b,0);
}

function spawnFx(parent){
  ['✦','◆','★'].forEach((g,i)=>{
    setTimeout(()=>{
      const el=document.createElement('div');el.className='sp';el.textContent=g;
      el.style.cssText=`left:${15+Math.random()*70}%;top:${10+Math.random()*70}%;color:${['#f0a8d8','#70c8f8','#c0a0f8'][i]};font-size:16px`;
      parent.appendChild(el);setTimeout(()=>el.remove(),700);
    },i*110);
  });
}

buildCB();
</script>
